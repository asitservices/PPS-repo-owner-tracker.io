name: Collect Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Collect data
        run: node scripts/collect-data.js
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_PAT_SALES_IMPACT: ${{ secrets.GH_PAT_SALES_IMPACT }}
      
      - name: Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "data: auto-update" || true
          git push origin main
