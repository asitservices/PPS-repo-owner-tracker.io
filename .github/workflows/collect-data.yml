name: Collect Repository Owner Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - run: node scripts/collect-data.js
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
