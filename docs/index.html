<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Owner Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h1 { margin-bottom: 30px; color: #58a6ff; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        .card h2 { color: #58a6ff; margin-bottom: 10px; font-size: 18px; }
        .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #30363d; }
        .stat:last-child { border-bottom: none; }
        .label { color: #8b949e; }
        .value { font-weight: bold; color: #58a6ff; }
        .percentage-bar { width: 100%; height: 8px; background: #30363d; border-radius: 4px; margin: 5px 0; overflow: hidden; }
        .percentage-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #79c0ff); transition: width 0.3s; }
        .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; margin-bottom: 40px; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        .chart-container.full { grid-column: 1 / -1; }
        .chart-container h3 { color: #58a6ff; margin-bottom: 20px; }
        .error { color: #f85149; text-align: center; padding: 40px; }
        .loading { text-align: center; padding: 40px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Repository Owner Tracker</h1>
        
        <div id="content" class="loading">Loading data...</div>

        <div id="charts" class="charts" style="display: none;">
            <div class="chart-container full">
                <h3>📈 Coverage Trend Over Time</h3>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>📊 Coverage by Organization</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>🎯 Repository Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let lineChart, barChart, pieChart;

        async function loadData() {
            try {
                const response = await fetch('./data/dashboard-data.json?v=' + Date.now());
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const organizations = data.organizations || [];
                
                if (organizations.length === 0) {
                    document.getElementById('content').innerHTML = '<p class="error">No data available yet. Check back later!</p>';
                    return;
                }

                // Cards
                let html = '<div class="grid">';
                organizations.forEach(org => {
                    html += `
                        <div class="card">
                            <h2>${org.name}</h2>
                            <div class="stat">
                                <span class="label">Total Repos:</span>
                                <span class="value">${org.totalRepos || 0}</span>
                            </div>
                            <div class="stat">
                                <span class="label">Assigned:</span>
                                <span class="value">${org.assignedRepos || 0}</span>
                            </div>
                            <div class="stat">
                                <span class="label">Coverage:</span>
                                <span class="value">${(org.percentage || 0).toFixed(1)}%</span>
                            </div>
                            <div class="percentage-bar">
                                <div class="percentage-fill" style="width: ${org.percentage || 0}%"></div>
                            </div>
                            <div class="stat">
                                <span class="label">Updated:</span>
                                <span class="value">${new Date(org.lastUpdated).toLocaleDateString()}</span>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                
                document.getElementById('content').innerHTML = html;

                // Charts
                document.getElementById('charts').style.display = 'grid';
                createCharts(organizations, data.trends || []);

            } catch (error) {
                document.getElementById('content').innerHTML = `<p class="error">Error loading data: ${error.message}</p>`;
            }
        }

        function createCharts(organizations, trends) {
            // Line Chart
            const lineCtx = document.getElementById('lineChart').getContext('2d');
            const lineDatasets = organizations.map((org, idx) => {
                const colors = ['#58a6ff', '#79c0ff', '#a371f7', '#d29922', '#3fb950', '#f85149', '#e1e4e8', '#6e40aa'];
                return {
                    label: org.name,
                    data: trends.map(t => t[org.name] || 0),
                    borderColor: colors[idx % colors.length],
                    backgroundColor: colors[idx % colors.length] + '20',
                    tension: 0.4,
                    fill: false,
                    borderWidth: 2
                };
            });

            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: trends.map(t => new Date(t.date).toLocaleDateString()),
                    datasets: lineDatasets
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#c9d1d9' } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: '#8b949e' },
                            grid: { color: '#30363d' }
                        },
                        x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
                    }
                }
            });

            // Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: organizations.map(o => o.name),
                    datasets: [{
                        label: 'Coverage %',
                        data: organizations.map(o => o.percentage || 0),
                        backgroundColor: '#58a6ff',
                        borderColor: '#79c0ff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#c9d1d9' } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: '#8b949e' },
                            grid: { color: '#30363d' }
                        },
                        x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
                    }
                }
            });

            // Pie Chart
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: organizations.map(o => o.name),
                    datasets: [{
                        data: organizations.map(o => o.totalRepos || 0),
                        backgroundColor: [
                            '#58a6ff', '#79c0ff', '#a371f7', '#d29922', '#3fb950', '#f85149', '#e1e4e8', '#6e40aa'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#c9d1d9' } }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
