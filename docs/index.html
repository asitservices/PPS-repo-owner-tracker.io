<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Owner Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; color: #58a6ff; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
        }
        .card h3 { color: #58a6ff; margin-bottom: 10px; }
        .stat { font-size: 24px; font-weight: bold; color: #3fb950; }
        .chart-container { 
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            height: 400px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Repository Owner Tracker</h1>
        
        <div class="grid" id="stats"></div>
        
        <div class="chart-container">
            <canvas id="trendsChart"></canvas>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./data/dashboard-data.json');
                const data = await response.json();
                
                // Stats
                const statsHtml = data.organizations
                    .map(org => `
                        <div class="card">
                            <h3>${org.name}</h3>
                            <div class="stat">${org.totalRepos}</div>
                            <p>Repositories</p>
                        </div>
                    `)
                    .join('');
                document.getElementById('stats').innerHTML = statsHtml;
                
                // Trends Chart
                const dates = data.trends.map(t => t.date);
                const orgs = data.organizations.map(o => o.name);
                
                const datasets = orgs.map((org, i) => {
                    const colors = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#a371f7', '#79c0ff', '#56d364', '#ff7b72'];
                    return {
                        label: org,
                        data: data.trends.map(t => t[org] || 0),
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length] + '20',
                        tension: 0.3,
                        fill: false
                    };
                });
                
                new Chart(document.getElementById('trendsChart'), {
                    type: 'line',
                    data: { labels: dates, datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#c9d1d9' }
                            }
                        },
                        scales: {
                            y: {
                                ticks: { color: '#c9d1d9' },
                                grid: { color: '#30363d' }
                            },
                            x: {
                                ticks: { color: '#c9d1d9' },
                                grid: { color: '#30363d' }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        loadData();
    </script>
</body>
</html>
